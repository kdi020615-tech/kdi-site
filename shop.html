<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KDI — Shop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400&display=swap');
@font-face { font-family:'Splash'; src:url('Splash-Regular.ttf') format('truetype'); }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--w:#f0ece4;--g:#b8a882;--b:#080808;}
html{scroll-behavior:smooth;}
body{background:var(--b);color:var(--w);font-family:'Inter',sans-serif;font-weight:300;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;z-index:9000;pointer-events:none;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px;}
nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:28px 48px;display:flex;justify-content:space-between;align-items:center;mix-blend-mode:difference;}
.nav-logo{font-family:'Splash',cursive;font-size:26px;letter-spacing:3px;color:var(--w);text-decoration:none;}
.nav-links{display:flex;gap:40px;list-style:none;}
.nav-links a{font-size:10px;letter-spacing:4px;color:rgba(240,236,228,.5);text-decoration:none;text-transform:uppercase;transition:color .3s;}
.nav-links a:hover{color:var(--w);}
.nav-links a.active{color:var(--w);}
.page-hero{height:50vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:60px;position:relative;}
.page-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(240,236,228,.06);}
.page-tag{font-size:9px;letter-spacing:6px;color:var(--g);margin-bottom:16px;}
.page-title{font-family:'Bebas Neue';font-size:clamp(64px,12vw,140px);line-height:.9;letter-spacing:-1px;text-align:center;}
.page-content{padding:80px 48px;max-width:1200px;margin:0 auto;}
.placeholder{text-align:center;padding:120px 0;}
.placeholder-icon{font-size:48px;color:rgba(240,236,228,.08);margin-bottom:24px;}
.placeholder-text{font-size:13px;letter-spacing:3px;color:rgba(240,236,228,.25);line-height:2;}
footer{border-top:1px solid rgba(240,236,228,.06);padding:48px;display:flex;justify-content:space-between;align-items:center;}
.ft-logo{font-family:'Splash',cursive;font-size:36px;letter-spacing:4px;color:var(--g);text-decoration:none;}
.ft-copy{font-size:9px;letter-spacing:3px;color:rgba(240,236,228,.12);text-align:right;line-height:2;}
@media(max-width:768px){
  nav{padding:20px 24px;} .nav-links{display:none;}
  .page-content{padding:60px 24px;}
  footer{padding:40px 24px;flex-direction:column;gap:16px;align-items:flex-start;}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">KDI</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="kdi.html">KDI</a></li>
    <li><a href="jys.html">JYS</a></li>
    <li><a href="myr.html">MYR</a></li>
    <li><a href="shop.html" class="active">Shop</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
<div class="page-hero">
  <div class="page-tag">// MERCHANDISE</div>
  <h1 class="page-title">SHOP</h1>
</div>
<div class="page-content">
  <div class="placeholder">
    <div class="placeholder-icon">◈</div>
    <div class="placeholder-text">COMING SOON<br/>굿즈 · 의류 · 액세서리</div>
  </div>
</div>
<footer>
  <a href="index.html" class="ft-logo">KDI</a>
  <div class="ft-copy">© 2026 KDI. ALL RIGHTS RESERVED.<br/>KOREA · OMOKCHEON-DONG · JOWON-DONG · SERYU-DONG</div>
</footer>
</body>
</html>
