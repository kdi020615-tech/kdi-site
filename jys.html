<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JYS — KDI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400&display=swap');

@font-face {
  font-family: 'Splash';
  src: url('Splash-Regular.ttf') format('truetype');
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --w: #ffffff;
  --g: #b8a882;
  --b: #0d0812;
}

html { scroll-behavior: smooth; }

body {
  background: var(--b);
  color: var(--w);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  cursor: none;
}

/* BACKGROUND IMAGE */
body::before {
  content:'';
  position:fixed; inset:0;
  z-index:0;
  pointer-events:none;
  background-image:url('hf_20260411_224114_9736cb1e-1f33-4c40-81b6-253d1912a798.png');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  opacity:.15;
  mix-blend-mode:screen;
}

/* GRAIN */
body::after {
  content:'';
  position:fixed; inset:0;
  z-index:9000;
  pointer-events:none;
  opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px;
}

/* CURSOR */
#cur {
  position:fixed; width:8px; height:8px;
  background:var(--w); border-radius:50%;
  pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  mix-blend-mode:difference;
  transition:width .2s, height .2s;
}
#cur-ring {
  position:fixed; width:30px; height:30px;
  border:1px solid rgba(255,255,255,.5); border-radius:50%;
  pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%);
  transition:width .3s, height .3s;
}

/* ── NAV ── */
nav {
  position:fixed; top:0; left:0; right:0;
  z-index:500;
  padding:28px 48px;
  display:flex; justify-content:space-between; align-items:center;
  mix-blend-mode:difference;
}
.nav-logo {
  font-family:'Splash', cursive;
  font-size:26px; letter-spacing:3px;
  color:var(--w);
  text-decoration:none;
}
.nav-links { display:flex; gap:40px; list-style:none; }
.nav-links a {
  font-size:10px; letter-spacing:4px;
  color:rgba(255,255,255,.7);
  text-decoration:none; text-transform:uppercase;
  transition:color .3s;
}
.nav-links a:hover { color:var(--w); }
.nav-links a.active { color:var(--w); }

/* ── ARTIST HERO (fullscreen video) ── */
.artist-hero {
  position:relative;
  height:100vh;
  overflow:hidden;
  display:flex; align-items:flex-end;
}

.artist-hero video {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  filter:grayscale(25%) contrast(1.08);
}

.ah-overlay {
  position:absolute; inset:0;
  background:linear-gradient(
    to top,
    rgba(13,8,18,.95) 0%,
    rgba(13,8,18,.3) 50%,
    rgba(13,8,18,.1) 100%
  );
}

.ah-content {
  position:relative; z-index:2;
  padding:0 48px 56px;
  width:100%;
  display:flex; justify-content:space-between; align-items:flex-end;
}

.ah-name {
  font-family:'Bebas Neue';
  font-size:clamp(64px, 12vw, 160px);
  line-height:.9;
  letter-spacing:-1px;
}

.ah-meta {
  text-align:right;
  padding-bottom:8px;
}
.ah-role {
  font-size:10px; letter-spacing:4px;
  color:var(--g); line-height:2;
  text-transform:uppercase;
}
.ah-num {
  font-family:'Bebas Neue';
  font-size:clamp(48px, 6vw, 80px);
  color:rgba(255,255,255,.15);
  line-height:1;
}

/* scroll hint on hero */
.ah-scroll {
  position:absolute;
  bottom:56px; right:48px;
  z-index:3;
  writing-mode:vertical-rl;
  font-size:9px; letter-spacing:4px;
  color:rgba(255,255,255,.5);
  display:flex; align-items:center; gap:12px;
}
.ah-scroll::before {
  content:'';
  width:1px; height:50px;
  background:linear-gradient(to bottom, var(--g), transparent);
  animation:scrollPulse 2s infinite;
}

/* ── PLACEHOLDER SECTION ── */
.section-placeholder {
  padding:120px 48px;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.sp-tag {
  font-size:9px; letter-spacing:5px;
  color:var(--g); margin-bottom:16px;
}
.sp-title {
  font-family:'Bebas Neue';
  font-size:clamp(48px, 7vw, 88px);
  line-height:1;
  margin-bottom:40px;
}
.sp-coming {
  display:inline-block;
  font-size:10px; letter-spacing:7px;
  color:rgba(255,255,255,.35);
  padding:16px 40px;
  border:1px solid rgba(255,255,255,.1);
  text-transform:uppercase;
}

/* ── FOOTER ── */
footer {
  padding:56px 48px;
  display:flex; justify-content:space-between; align-items:center;
}
.ft-logo { font-family:'Splash', cursive; font-size:36px; letter-spacing:4px; color:var(--g); }
.ft-copy { font-size:9px; letter-spacing:3px; color:rgba(255,255,255,.25); text-align:right; line-height:2; }

/* ── REVEAL ── */
.rv { opacity:0; transform:translateY(28px); transition:opacity .9s ease, transform .9s cubic-bezier(.16,1,.3,1); }
.rv.on { opacity:1; transform:translateY(0); }
.rv.d1{transition-delay:.1s;} .rv.d2{transition-delay:.2s;} .rv.d3{transition-delay:.3s;}

/* ── PLAYER ── */
#player {
  position:fixed; bottom:32px; left:48px;
  z-index:600;
  display:flex; align-items:center; gap:14px;
  cursor:pointer;
}
.pl-btn {
  width:42px; height:42px;
  border:1px solid rgba(255,255,255,.25); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  transition:border-color .3s, background .3s;
}
#player:hover .pl-btn {
  border-color:rgba(255,255,255,.7);
  background:rgba(255,255,255,.08);
}
.pl-icon { width:12px; height:12px; fill:var(--w); }
.pl-info { line-height:1.5; }
.pl-track { font-size:10px; letter-spacing:3px; color:var(--g); }
.pl-status { font-size:9px; letter-spacing:2px; color:rgba(255,255,255,.35); }
.eq { display:flex; align-items:flex-end; gap:2px; height:14px; margin-left:4px; }
.eq-b {
  width:2px; background:var(--g); border-radius:1px;
  animation:eqAnim .7s ease-in-out infinite alternate;
}
.eq-b:nth-child(1){animation-duration:.5s;}
.eq-b:nth-child(2){animation-duration:.8s;}
.eq-b:nth-child(3){animation-duration:.45s;}
.eq-b:nth-child(4){animation-duration:.65s;}
.eq-b.off { animation-play-state:paused; height:2px !important; }

/* ── KEYFRAMES ── */
@keyframes scrollPulse { 0%,100%{opacity:1;} 50%{opacity:.2;} }
@keyframes eqAnim { from{height:2px;} to{height:14px;} }

/* ── RESPONSIVE ── */
@media (max-width:768px) {
  body { cursor: auto; }
  #cur, #cur-ring { display:none; }

  nav { padding:20px 24px; }
  .nav-links { display:none; }
  .nav-logo { font-size:22px; }

  .artist-hero { height: 100svh; }
  .ah-content {
    padding: 0 24px 44px;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .ah-name { font-size: clamp(52px, 16vw, 80px); }
  .ah-num { display:none; }
  .ah-role { font-size: 9px; letter-spacing:3px; }
  .ah-scroll { display:none; }

  .section-placeholder { padding: 60px 24px; }
  .sp-title { font-size: clamp(36px, 10vw, 52px); }

  footer {
    padding: 40px 24px;
    flex-direction: column;
    gap: 16px;
    align-items: flex-start;
  }
  .ft-logo { font-size:30px; }
  .ft-copy { text-align:left; font-size:8px; }

  #player {
    left: 16px;
    bottom: 20px;
    gap: 10px;
  }
  .pl-btn { width:36px; height:36px; }
  .pl-track { font-size:9px; }
  .pl-status { font-size:8px; }
  .eq { display:none; }
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">KDI</a>
  <ul class="nav-links">
    <li><a href="kdi.html">KDI</a></li>
    <li><a href="jys.html" class="active">JYS</a></li>
    <li><a href="myr.html">MYR</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- ═══ JYS HERO ═══ -->
<section class="artist-hero" id="jys-hero">
  <video id="jys-video" autoplay muted playsinline webkit-playsinline></video>
  <div class="ah-overlay"></div>
  <div class="ah-content">
    <div class="ah-name">JYS</div>
    <div class="ah-meta">
      <div class="ah-num">02</div>
      <div class="ah-role">Rapper<br/>Songwriter</div>
    </div>
  </div>
  <div class="ah-scroll">SCROLL</div>
</section>

<!-- MUSIC -->
<section class="section-placeholder rv" id="music">
  <div class="sp-tag">// MUSIC</div>
  <h2 class="sp-title">MUSIC</h2>
  <div class="sp-coming">COMING SOON</div>
</section>

<!-- GALLERY -->
<section class="section-placeholder rv" id="gallery">
  <div class="sp-tag">// GALLERY</div>
  <h2 class="sp-title">GALLERY</h2>
  <div class="sp-coming">COMING SOON</div>
</section>

<!-- AUDIO -->
<audio id="audio" loop>
  <source src="OITS_121_Amin_@Magnum77Chase_@Myr (1).mp3" type="audio/mpeg"/>
</audio>

<!-- PLAYER -->
<div id="player" onclick="togglePlay()">
  <div class="pl-btn">
    <svg class="pl-icon" id="plIcon" viewBox="0 0 24 24">
      <rect x="6" y="4" width="4" height="16"/>
      <rect x="14" y="4" width="4" height="16"/>
    </svg>
  </div>
  <div class="pl-info">
    <div class="pl-track">OITS 121</div>
    <div class="pl-status" id="plStatus">NOW PLAYING</div>
  </div>
  <div class="eq" id="eq">
    <div class="eq-b" style="height:6px"></div>
    <div class="eq-b" style="height:10px"></div>
    <div class="eq-b" style="height:4px"></div>
    <div class="eq-b" style="height:12px"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="ft-logo">KDI</div>
  <div class="ft-copy">&copy; 2026 KDI. ALL RIGHTS RESERVED.<br/>KOREA &middot; OMOKCHEON-DONG &middot; JOWON-DONG &middot; SERYU-DONG</div>
</footer>

<script>
/* CURSOR */
const cur = document.getElementById('cur');
const ring = document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cur.style.left=mx+'px'; cur.style.top=my+'px';
});
(function tick(){
  rx+=(mx-rx)*.1; ry+=(my-ry)*.1;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(tick);
})();
document.querySelectorAll('a,.artist-hero,#player').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    cur.style.width='16px'; cur.style.height='16px';
    ring.style.width='46px'; ring.style.height='46px';
  });
  el.addEventListener('mouseleave',()=>{
    cur.style.width='8px'; cur.style.height='8px';
    ring.style.width='30px'; ring.style.height='30px';
  });
});

/* VIDEO PLAYLIST */
function makePlaylist(videoEl, srcs) {
  let idx = 0;
  videoEl.src = srcs[0];
  videoEl.load();
  videoEl.play().catch(()=>{});
  videoEl.addEventListener('ended', () => {
    idx = (idx + 1) % srcs.length;
    videoEl.src = srcs[idx];
    videoEl.load();
    videoEl.play().catch(()=>{});
  });
}

makePlaylist(document.getElementById('jys-video'), [
  "인물사진 /JYS(정윤상)/hf_20260409_201709_cc577aa1-60da-4374-80fc-7917fdd3c1ad.mp4",
  "인물사진 /JYS(정윤상)/제목 없음.mp4"
]);

/* MUSIC PLAYER */
const audio = document.getElementById('audio');
const plIcon = document.getElementById('plIcon');
const plStatus = document.getElementById('plStatus');
const eqBars = document.querySelectorAll('.eq-b');
let playing = false;

audio.play().then(() => {
  playing = true;
  plStatus.textContent = 'NOW PLAYING';
  plIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  eqBars.forEach(b => b.classList.remove('off'));
}).catch(() => {
  playing = false;
  plIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
  plStatus.textContent = 'CLICK TO PLAY';
  eqBars.forEach(b => b.classList.add('off'));
});

function togglePlay() {
  if (playing) {
    audio.pause();
    plIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
    plStatus.textContent = 'PAUSED';
    eqBars.forEach(b => b.classList.add('off'));
  } else {
    audio.play();
    plIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    plStatus.textContent = 'NOW PLAYING';
    eqBars.forEach(b => b.classList.remove('off'));
  }
  playing = !playing;
}

/* SCROLL REVEAL */
const obs = new IntersectionObserver(es => {
  es.forEach(e => { if(e.isIntersecting) e.target.classList.add('on'); });
}, { threshold: .15 });
document.querySelectorAll('.rv').forEach(el => obs.observe(el));
</script>
</body>
</html>
